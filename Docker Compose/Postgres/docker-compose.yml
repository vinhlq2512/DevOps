version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: shared.postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin_secret
      - POSTGRES_DB=default_db
    volumes:
      - /home/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - shared_network

networks:
  shared_network:
    external: true
