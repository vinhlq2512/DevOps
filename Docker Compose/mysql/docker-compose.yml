version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: shared.mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin_secret
      MYSQL_DATABASE: default_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin_secret
    volumes:
      - /home/data/mysql:/var/lib/mysql
    networks:
      - shared_network

networks:
  shared_network:
    external: true
