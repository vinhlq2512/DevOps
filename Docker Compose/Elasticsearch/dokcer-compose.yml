version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elastic/elasticsearch:8.16.1
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=datasearch
      - bootstrap.memory_lock=true
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - cluster.initial_master_nodes=elasticsearch
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '9200:9200'
    volumes:
      - esdata:/Code/data

  kibana:
    image: docker.elastic.co/kibana/kibana:kibana
    ports:
      - '5601:5601'

volumes:
  esdata:
    driver_opts:
      device: /Code/data
      o: bind
