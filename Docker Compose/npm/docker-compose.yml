version: '3.8'

services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: shared.npm
    restart: unless-stopped
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - /home/data/npm:/data
      - /home/data/letsencrypt:/etc/letsencrypt
    networks:
      - shared_network

networks:
  shared_network:
    external: true
